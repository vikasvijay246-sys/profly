<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PropFlow</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="login-body">

<div class="login-wrap">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon large">P</div>
      <h1>PropFlow</h1>
      <p>Property Management Platform</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash flash-{{ cat }} mb-16">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Login form -->
    <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
      <div class="form-group">
        <label class="form-label">Phone / Username</label>
        <input type="text" name="phone" class="form-input" placeholder="Enter your phone or username"
               required autofocus autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-with-icon">
          <input type="password" name="password" id="pw" class="form-input"
                 placeholder="Enter password" required autocomplete="current-password"/>
          <button type="button" class="input-icon-btn" onclick="togglePw()" tabindex="-1">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
    </form>

    <!-- Demo credentials -->
    <div class="demo-box">
      <div class="demo-title">Demo Accounts</div>
      <div class="demo-grid">
        <button class="demo-btn" onclick="fillLogin('admin','admin123')">
          <strong>Admin</strong><span>admin / admin123</span>
        </button>
        <button class="demo-btn" onclick="fillLogin('owner1','owner123')">
          <strong>Owner</strong><span>owner1 / owner123</span>
        </button>
        <button class="demo-btn" onclick="fillLogin('tenant1','tenant123')">
          <strong>Tenant</strong><span>tenant1 / tenant123</span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
function togglePw() {
  const pw = document.getElementById('pw');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}
function fillLogin(phone, pw) {
  document.querySelector('[name=phone]').value = phone;
  document.querySelector('[name=password]').value = pw;
}
</script>
</body>
</html>
